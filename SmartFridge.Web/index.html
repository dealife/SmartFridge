<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fridge AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .recipe-card { transition: 0.3s; cursor: pointer; }
        .recipe-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">🍎 Умный Холодильник</h1>
        <div class="text-center mb-4">
    <a href="saved.html" class="btn btn-outline-info">📖 Моя книга рецептов</a>
</div>
        <div class="card p-4 shadow-sm mb-4">
            <label class="form-label">Загрузите фото продуктов:</label>
            <input type="file" id="imageInput" class="form-control mb-3" accept="image/*">
            <button onclick="analyzeFridge()" class="btn btn-primary w-100" id="btnAnalyze">Анализировать</button>
        </div>

        <div id="results" class="d-none">
            <h3>Найденные продукты:</h3>
            <div id="ingredientsList" class="mb-4"></div>
            
            <h3>Предложенные рецепты:</h3>
            <div id="recipesList" class="row"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
